name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    permissions:
       id-token: write
       contents: read
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
      - name: Install OIDC Client from Core Package
        run: npm install @actions/core@1.6.0 @actions/http-client
      - name: Get Id Token
        uses: actions/github-script@v6
        id: idtoken
        with:
           script: |
               const coredemo = require('@actions/core')
               return await coredemo.getIDToken()
           result-encoding: string
      - name: Substitute AAD_TENANT_ID into site/public/staticwebapp.config.json
        # The tenant ID is not a secret but we keep it out of the repo to
        # sidestep any Cefic policy on committing tenant identifiers and
        # to make per-environment reuse of the template trivial. See
        # context-prep/cms-design.md §"Tenant ID substitution" for
        # rationale + troubleshooting.
        env:
          AAD_TENANT_ID: ${{ secrets.AAD_TENANT_ID }}
        run: |
          set -euo pipefail
          if [ -z "${AAD_TENANT_ID:-}" ]; then
            echo "::error::AAD_TENANT_ID secret is not set. Add it at"
            echo "GitHub → repo Settings → Secrets and variables → Actions → New repository secret."
            exit 1
          fi
          # envsubst with an explicit var list — only $AAD_TENANT_ID is
          # substituted, every other $-prefixed string in the file is
          # left untouched (defense in depth; we control the file so in
          # practice nothing else matches).
          envsubst '$AAD_TENANT_ID' \
            < site/public/staticwebapp.config.json \
            > site/public/staticwebapp.config.json.tmp
          mv site/public/staticwebapp.config.json.tmp site/public/staticwebapp.config.json
          # Fail fast if the placeholder survived (e.g. someone renamed
          # the marker and forgot to update this step).
          if grep -qF '$AAD_TENANT_ID' site/public/staticwebapp.config.json; then
            echo "::error::Placeholder \$AAD_TENANT_ID still present after substitution."
            cat site/public/staticwebapp.config.json
            exit 1
          fi
          # Log the issuer URL for confidence (tenant ID is public metadata).
          issuer=$(python3 -c "import json; print(json.load(open('site/public/staticwebapp.config.json'))['auth']['identityProviders']['azureActiveDirectory']['registration']['openIdIssuer'])")
          echo "openIdIssuer resolved to: $issuer"

      # ─── Pre-build the Astro site so we can drive the print-layout pages
      # against a local preview server and produce a fresh PDF per edition.
      # The site PDF lives in site/public/downloads/{id}.pdf so the Astro
      # rebuild that runs INSIDE the SWA deploy step picks it up and ships
      # it as a static asset alongside the rest of the dist/.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium-v1.49

      - name: Install site dependencies
        working-directory: site
        run: npm ci

      - name: Build Astro site (pre-build for PDF generation)
        working-directory: site
        run: npx astro build

      - name: Install Playwright Chromium
        working-directory: site
        run: npx playwright install --with-deps chromium

      - name: Generate edition PDFs
        working-directory: site
        run: |
          set -euo pipefail
          # Boot the preview server in the background, then loop until it
          # answers a request (the wait-for-server logic is inside the
          # generator itself, so we just give it a moment to start).
          npx astro preview --host 127.0.0.1 --port 4327 > /tmp/astro-preview.log 2>&1 &
          PREVIEW_PID=$!
          # Generate into site/public/downloads so the second Astro build
          # (run by the SWA deploy step) bundles the PDFs into dist/.
          if ! node scripts/generate-pdfs.mjs \
                 --site-url http://127.0.0.1:4327 \
                 --output public/downloads; then
            echo "::error::PDF generation failed"
            cat /tmp/astro-preview.log
            kill $PREVIEW_PID 2>/dev/null || true
            exit 1
          fi
          kill $PREVIEW_PID 2>/dev/null || true
          ls -la public/downloads/

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_DELIGHTFUL_CLIFF_04D721F03 }}
          action: "upload"
          ###### Repository/Build Configurations - These values can be configured to match your app requirements. ######
          # For more information regarding Static Web App workflow configurations, please visit: https://aka.ms/swaworkflowconfig
          app_location: "site" # Astro app lives under /site
          api_location: "api" # Azure Function for the CMS proxy (cms-commit + gh-proxy)
          output_location: "dist" # Astro default build output
          # Explicit build command so Oryx compiles the TypeScript AFTER
          # installing deps, not via an npm postinstall hook. The postinstall
          # hook previously fired BEFORE Oryx renamed .oryx_prod_node_modules
          # to node_modules, so tsc could not resolve @azure/functions and
          # Oryx swallowed the error as "assuming assets are already built" —
          # silently keeping the prior Function App revision live.
          api_build_command: "npm ci && npm run build"
          github_id_token: ${{ steps.idtoken.outputs.result }}
          ###### End of Repository/Build Configurations ######

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          action: "close"
