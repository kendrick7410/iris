# Sveltia CMS config for Iris editorial portal.
# Paired with site/public/admin/index.html. Loaded at /admin/.
#
# Principles:
#   - Cas B: the CMS edits site/src/content/editions/*.mdx directly.
#     Alignment toward editorial/drafts/ is deferred (STATE.md §5.8).
#   - publish_mode: simple — save = direct commit on main, no PR workflow.
#   - Media disabled: Moncef does not upload images. Charts are produced
#     by the pipeline and committed under site/public/charts/{month}/.
#   - Moncef cannot create or delete editions from the CMS.
#
# See context-prep/cms-design.md §OD1 and §"Sveltia version lock" for
# the architecture rationale and upgrade procedure.

backend:
  name: github
  repo: kendrick7410/iris
  branch: main
  # All GitHub API calls go through our Azure Function (/api/gh/*), which
  # validates the Azure SWA principal and injects the machine PAT. The CMS
  # itself never sees the PAT; the token in localStorage is a stub.
  api_root: https://iris.cefic.org/api/gh

# Save commits straight to main — Moncef is the editorial authority and
# each save is tiny (one edition). If we ever need a review gate, switch
# to `editorial_workflow` which creates a PR per save.
publish_mode: simple

# media_folder intentionally omitted — CMS is read+write on text only.

collections:
  - name: editions
    label: Editions
    label_singular: Edition
    # Cas B: flat MDX under the site's content collection.
    folder: site/src/content/editions
    create: false                 # pipeline creates editions, not Moncef
    delete: false                 # archives stay
    slug: '{{fields.month}}'
    format: frontmatter
    extension: mdx
    identifier_field: month
    summary: '{{month}} — reviewed: {{reviewed}}'
    sortable_fields: [month]

    fields:
      - label: Month
        name: month
        widget: string
        required: true
        hint: 'Generated by the pipeline. Do not edit — it drives the URL slug and file name.'

      - label: Publication date
        name: publication_date
        widget: string
        required: true
        hint: 'Generated by the pipeline. Do not edit.'

      - label: Pipeline version
        name: pipeline_version
        widget: string
        required: false
        hint: 'Generated by the pipeline. Do not edit.'

      - label: Reviewed
        name: reviewed
        widget: boolean
        default: false
        required: false
        hint: >
          Set to TRUE when your review of this edition is complete. Once
          TRUE, the monthly pipeline will refuse to regenerate this
          edition (protecting your edits). Untick to allow the pipeline
          to overwrite.

      # ───────────────────────────────────────────────────────────────
      # DEVIATION from the original spec.
      #
      # The spec asked for a `sections: list` of {heading, body, chart_id}
      # with each heading surfaced as the dashboard view title and
      # chart_id readonly. That shape requires the MDX to carry structured
      # sections in frontmatter, which it does NOT today — the current
      # pipeline writes a flat body with `---` separators and inline
      # <img/> chart tags. Implementing structured sections would need:
      #   - pipeline rewrite (assemble sections[] array into frontmatter)
      #   - Astro template rewrite ([id].astro reads entry.data.sections
      #     instead of entry.body)
      #   - migration of existing editions
      # That work belongs with the alignment patch (STATE.md §5.8).
      #
      # For MVP we ship a single `body` field that edits the whole MDX
      # body as text. Widget is `text` (not `markdown`) so Sveltia does
      # NOT try to prettify whitespace, reformat headings, or mangle the
      # inline <img/> tags and `---` separators. Moncef sees raw markdown.
      # ───────────────────────────────────────────────────────────────
      - label: Body
        name: body
        widget: text
        required: true
        hint: >
          Edit wording only. DO NOT change numbers (e.g. "42.1%", "€34.5 bn") —
          they come from the Eurostat/Comext pipeline and must match the
          charts. DO NOT modify `<img src=... />` tags or the `---` lines
          that separate sections. You can rephrase sentences, fix typos,
          tighten wording. When in doubt, ask Jonathan.
